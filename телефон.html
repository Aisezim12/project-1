<!DOCTYPE html>
<html>
<head>
    <title></title>
    <style type="text/css">
        .ais {
            width: 300px;
            height: 500px;
            background: black;
            border-radius: 25px;
            position: relative;
            padding: 16px;
            box-sizing: border-box;
            margin: 20px auto;
        }
        .box {
            width: 270px;
            height: 450px;
            position: relative;
            display: flex;
        }
        .img {
            width: 270px;
            height: 450px;
            position: absolute;
            border-radius: 15px;
            z-index: 1;
            object-fit: cover;
        }
        .a {
            width: 135px;
            height: 430px;
            z-index: 5;
            cursor: pointer;
        }
        #span1, #span2 {
            width: 120px;
            height: 4px;
            background-color: grey;
            position: absolute;
            top: 15px;
            z-index: 3;
            border-radius: 10px;
        }
        #span1 { left: 10px; }
        #span2 { right: 10px; }

        .p {
            position: absolute;
            bottom: 15px;
            left: 33%;
            background: white;
            border-radius: 10px;
            width: 100px;
            height: 5px;
            z-index: 4;
        }
    </style>
</head>
<body>

<div class="ais">
    <div class="box">
        <img src="https://i.pinimg.com/originals/2d/14/f5/2d14f5ef2be029b3866a544a3c326d29.jpg?nii=t" class="img" id="img">
        
        <div class="a" id="a"></div>
        <div class="a" id="b"></div>
        
        <span class="p"></span>
        <span id="span1" style="background: white;"></span>
        <span id="span2"></span>
    </div>
</div>

<script type="text/javascript">
    let img = document.getElementById('img')
    let a = document.getElementById('a')
    let b = document.getElementById('b')
    let span1 = document.getElementById('span1')
    let span2 = document.getElementById('span2')

    a.onclick = function () {
        img.src = 'https://i.pinimg.com/originals/2d/14/f5/2d14f5ef2be029b3866a544a3c326d29.jpg?nii=t'
        span1.style.background = 'white'
        span2.style.background = 'grey'
    }

    b.onclick = function () {
        img.src = 'https://img.freepik.com/free-photo/majestic-deer-alpine-meadow_23-2151961313.jpg?semt=ais_hybrid&w=740&q=80'
        span2.style.background = 'white'
        span1.style.background = 'grey'
    }
</script>

</body>
</html>
